name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel
        run: >
          npx vercel deploy --prod --yes
          --project humanoid-robots-intelligence-dashboard
          --scope mycomind-2295s-projects
          --token "${{ secrets.VERCEL_TOKEN }}"
